<html lang="ru">

        <link rel="shortcut icon" href="img/ico/logo.svg" type="image/x-icon">
        <link rel="stylesheet" href="style/style.css">

        <section class="banner">
            <div class="banner__inner container">
                <header class="header">
                    <a href="index.html" class="logo">

                            src="img/ico/logo.svg"

                            height="72"
                            loading="lazy"
